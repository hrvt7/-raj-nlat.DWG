        <h1>TakeoffPro – Villamos Ajánlatkészítő Szoftver</h1>
        <p>DXF/DWG/PDF tervrajzból automatikus mennyiségkimutatás és árajánlat generálás villamos kivitelezőknek.</p>

        <h2>Funkciók</h2>
        <ul>
          <li><strong>DXF &amp; DWG Import</strong> – DXF natívan, korlátlan méretben. DWG direkt elemzéssel, nem kell konvertálni.</li>
          <li><strong>Automatikus mennyiségkimutatás</strong> – 95%+ pontosság DXF esetén. A blokkok és vonalak gépi precizitással számolhatók.</li>
          <li><strong>60+ villamos normaidő-tétel</strong> – Magyar szabványok alapján: dugalj, kapcsoló, lámpa, kismegszakító, kábeltálca, kábel fektetés. Falanyag (GK/Ytong/Tégla/Beton) tételenként állítható.</li>
          <li><strong>PDF tervrajz feldolgozás</strong> – PDF alaprajzok feltöltése és elemzése.</li>
          <li><strong>Profi PDF árajánlat</strong> – Céges logóval, részletes tételsorokkal, anyag+munkadíj bontással.</li>
          <li><strong>Assembly szerkesztő</strong> – Összetett munkacsoportok: anyag + munkadíj + normaidő egy csomagban.</li>
          <li><strong>Kábelhossz kalkuláció</strong> – Réteg-alapú, MST és eszközszám fallback módszerek.</li>
          <li><strong>CSV/PDF export</strong> – Anyagjegyzék és árajánlat exportálás.</li>
        </ul>

        <h2>Hogyan működik?</h2>
        <ol>
          <li>Töltsd fel a DXF/DWG/PDF tervrajzot</li>
          <li>Az app automatikusan azonosítja a rétegeket és blokkokat</li>
          <li>Ellenőrizd és finomítsd a mennyiségkimutatást</li>
          <li>Generálj profi PDF árajánlatot percek alatt</li>
        </ol>

        <dl>
          <dt>Milyen fájlformátumokat fogad el?</dt>
          <dd>DXF natívan, korlátlan méretben. DWG direkt elemzéssel – nem kell konvertálni. PDF tervrajzok feldolgozása is támogatott.</dd>
          <dt>Mennyire pontos a mennyiségkimutatás?</dt>
          <dd>DXF esetén 95%+ pontosság. DWG esetén az adatok kinyerése a bináris formátumból közvetlen. Minden esetben van review lépés.</dd>
          <dt>Kell AutoCAD a használathoz?</dt>
          <dd>Nem. Az app böngészőben fut, nem kell semmit telepíteni.</dd>
          <dt>Mi van a normaidő-adatbázisban?</dt>
          <dd>60+ villamos szerelési normaidő-tétel, magyar szabványok alapján. Az adatbázis szerkeszthető és bővíthető.</dd>
          <dt>Mennyit spórolok egy ajánlaton?</dt>
          <dd>Egy átlagos projekt ajánlata manuálisan 3-8 munkaóra. Az appban ugyanez 15-30 perc.</dd>
          <dt>Biztonságos a fájlfeltöltés?</dt>
